name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cpp-tests:
    name: C++ Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            compiler: g++-14
            install: sudo apt-get update && sudo apt-get install -y g++-14 libsqlite3-dev
            env_cc: gcc-14
            env_cxx: g++-14
          - os: macos-14
            compiler: clang++
            install: ""
            env_cc: clang
            env_cxx: clang++

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        if: matrix.install != ''
        run: ${{ matrix.install }}

      - name: Configure
        env:
          CC: ${{ matrix.env_cc }}
          CXX: ${{ matrix.env_cxx }}
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Test
        working-directory: build
        run: ctest --output-on-failure

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: python
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Test
        working-directory: python
        run: pytest ../tests/python/ -v
